name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: cd server && npm install && cd ..
      - run: npx electron-builder --win --x64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: Handwerker-Software-Windows
          path: dist/*.exe
          if-no-files-found: error

  build-mac-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: cd server && npm install && cd ..
      - run: npx electron-builder --mac --arm64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: Handwerker-Software-macOS-ARM
          path: dist/*.dmg
          if-no-files-found: error

  build-mac-intel:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: cd server && npm install && cd ..
      - run: npx electron-builder --mac --x64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: Handwerker-Software-macOS-Intel
          path: dist/*.dmg
          if-no-files-found: error

  release:
    needs: [build-win, build-mac-arm, build-mac-intel]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/Handwerker-Software-Windows/*
            artifacts/Handwerker-Software-macOS-ARM/*
            artifacts/Handwerker-Software-macOS-Intel/*
          draft: true
