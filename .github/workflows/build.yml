name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --ignore-scripts
      - run: npx electron-builder --win
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/Handwerker-Software*.exe

  build-mac-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx electron-builder --mac --arm64
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/Handwerker-Software*.dmg

  build-mac-intel:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx electron-builder --mac --x64
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/Handwerker-Software*.dmg
